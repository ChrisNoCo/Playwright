name: Sync Values In Teaching

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium

      - name: Run sync script
        env:
          VIT_USERNAME: ${{ secrets.VIT_USERNAME }}
          VIT_PASSWORD: ${{ secrets.VIT_PASSWORD }}
          VIT_COURSE_URL: ${{ secrets.VIT_COURSE_URL }}
        run: python sync.py

      - name: Commit updated log
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add log.json index.html
          git diff --staged --quiet || git commit -m "Sync log update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
